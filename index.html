<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Workspace | Fabio Pro</title>
    
    <script src="https://jsdelivr.net"></script>

    <style>
        :root {
            --bg-color: rgba(240, 242, 245, 0.85);
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --primary: #6c5ce7;
        }

        [data-theme="dark"] {
            --bg-color: rgba(26, 26, 46, 0.9);
            --card-bg: #16213e;
            --text-main: #e9ecef;
            --primary: #4834d4;
        }

        body {
            background-image: url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            transition: 0.4s;
            color: var(--text-main);
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: #f1c40f; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin: 0; }
        header p { color: #ffffff; font-style: italic; font-weight: bold; margin-top: 5px; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
        }

        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; background: rgba(0,0,0,0.02); color: inherit; }
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; padding: 12px; width: 100%; margin-top: 5px; }

        .pergunta { font-size: 1.1rem; min-height: 50px; margin-bottom: 15px; font-weight: bold; }
        .res-feedback { margin-top: 10px; font-weight: bold; height: 20px; }
        .concluida { text-decoration: line-through; opacity: 0.5; color: #636e72; }

        #theme-toggle { position: fixed; top: 20px; right: 20px; font-size: 24px; background: rgba(255,255,255,0.2); border-radius: 50%; padding: 10px; color: white; cursor: pointer; }
        
        .progress-container { background: #eee; border-radius: 10px; height: 12px; margin: 15px 0 5px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); width: 0%; height: 100%; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body data-theme="light">

    <div id="theme-toggle" onclick="toggleTheme()">🌓</div>

    <header>
        <h1>Creator Flow 🚀</h1>
        <p>"Learning IT: One step at a time."</p>
    </header>

    <div class="dashboard">
        <!-- BLOCK 1: DAILY GOALS -->
        <div class="card">
            <h2 style="text-align: left; margin:0">Daily Goals 📝</h2>
            <div class="progress-container"><div id="barra-progresso" class="progress-bar"></div></div>
            <p style="font-size: 0.8rem; text-align: right; margin-bottom: 15px;">Progress: <span id="texto-progresso">0%</span></p>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="taskInput" placeholder="New task...">
                <button class="btn-main" style="width: 60px; margin:0" onclick="addTask()">+</button>
            </div>
            <ul id="taskList" style="padding: 10px 0; margin: 0; text-align: left"></ul>
        </div>

        <!-- BLOCK 2: TECH QUIZ -->
        <div class="card">
            <h2>Tech Quiz 🧠</h2>
            <p>Score: <span id="placar" style="color: var(--primary); font-weight: bold;">0</span></p>
            <div id="pergunta-texto" class="pergunta">Loading...</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background:#2ecc71" onclick="verificar(true)">YES</button>
                <button class="btn-main" style="background:#e74c3c" onclick="verificar(false)">NO</button>
            </div>
            <div id="feedback" class="res-feedback"></div>
            <button class="btn-main" style="background:#636e72; margin-top: 15px;" onclick="proximaPergunta()">Next</button>
        </div>

        <!-- BLOCK 3: BUDGET TOOL -->
        <div class="card">
            <h2 style="text-align: left; margin:0">Budget Tool 💡</h2>
            <div style="margin-top: 20px;">
                <input type="number" id="n1" placeholder="Value 1">
                <input type="number" id="n2" placeholder="Value 2">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-main" onclick="calc('+')">+</button>
                    <button class="btn-main" onclick="calc('*')">x</button>
                </div>
                <h3 id="res-calc" style="color: var(--primary); margin-top: 15px; font-size: 2rem;">0</h3>
            </div>
        </div>

        <!-- BLOCK 4: STUDY TIMER -->
        <div class="card">
            <h2>Study Timer ⏱️</h2>
            <div id="timer-display" style="font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #2ecc71;">25:00</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background:#27ae60" onclick="startTimer()">START</button>
                <button class="btn-main" style="background:#e67e22" onclick="pauseTimer()">PAUSE</button>
                <button class="btn-main" style="background:#95a5a6" onclick="resetTimer()">RESET</button>
            </div>
        </div>
    </div>

    <footer style="margin-top: 40px; color: white; text-align: center;">
        <p>© 2026 Dashboard Created by <strong>Fabio</strong> | IT Student 🚀</p>
    </footer>

    <script>
        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        window.onload = () => {
            const s = JSON.parse(localStorage.getItem("fabioIntTasks")) || [];
            if (s.length === 0) {
                const i = ["English Study 🇺🇸", "IT Study 💻", "Physical Activity 🏋️", "Finance Org 💰"];
                i.forEach(t => renderTask(t, false));
                saveTasks();
            } else { s.forEach(t => renderTask(t.text, t.done)); }
            atualizarGrafico(); carregarPergunta();
        };

        function addTask() {
            const i = document.getElementById('taskInput');
            if(!i.value) return;
            renderTask(i.value, false); saveTasks(); i.value = '';
        }

        function renderTask(text, done) {
            const li = document.createElement('li');
            li.style.cssText = "background:rgba(0,0,0,0.05); margin:5px 0; padding:10px; border-radius:12px; list-style:none; display:flex; justify-content:space-between; align-items:center;";
            li.innerHTML = `<span onclick="toggleTask(this)" class="${done?'concluida':''}" style="flex-grow:1; cursor:pointer;">${text}</span>
                <button onclick="this.parentElement.remove(); saveTasks()" style="background:none; border:none; cursor:pointer">🗑️</button>`;
            document.getElementById('taskList').appendChild(li);
        }

        function toggleTask(el) { el.classList.toggle('concluida'); saveTasks(); }

        function saveTasks() {
            const t = [];
            document.querySelectorAll('#taskList li').forEach(li => {
                t.push({ text: li.querySelector('span').innerText, done: li.querySelector('span').classList.contains('concluida') });
            });
            localStorage.setItem("fabioIntTasks", JSON.stringify(t));
            atualizarGrafico();
        }

        function atualizarGrafico() {
            const tot = document.querySelectorAll('#taskList li').length;
            const con = document.querySelectorAll('#taskList .concluida').length;
            const por = tot > 0 ? Math.round((con / tot) * 100) : 0;
            document.getElementById('barra-progresso').style.width = por + "%";
            document.getElementById('texto-progresso').innerText = por + "%";
            if (por === 100 && tot > 0) { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }
        }

        const perguntas = [
            { q: "Is HTML a programming language?", a: false },
            { q: "Does CSS style the page?", a: true },
            { q: "Can JS create browser alerts?", a: true },
            { q: "Is Bootstrap a CSS framework?", a: true }
        ];
        let idx = 0; let pts = 0;
        function carregarPergunta() { document.getElementById('pergunta-texto').innerText = perguntas[idx].q; document.getElementById('feedback').innerText = ""; }
        function verificar(res) {
            const f = document.getElementById('feedback');
            if (f.innerText !== "") return;
            const cor = (res === perguntas[idx].a);
            f.innerText = cor ? "Correct! ✅" : "Wrong! ❌";
            f.style.color = cor ? "#2ecc71" : "#e74c3c";
            if(cor) { pts++; document.getElementById('placar').innerText = pts; }
        }
        function proximaPergunta() { idx = (idx + 1) % perguntas.length; carregarPergunta(); }

        function calc(op) {
            const v1 = Number(document.getElementById('n1').value);
            const v2 = Number(document.getElementById('n2').value);
            document.getElementById('res-calc').innerText = op === '+' ? v1 + v2 : v1 * v2;
        }

        let tmr; let tmp = 25 * 60;
        function atualizarDisplay() {
            const m = Math.floor(tmp / 60); const s = tmp % 60;
            document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        function startTimer() { clearInterval(tmr); tmr = setInterval(() => { if(tmp>0){tmp--; atualizarDisplay();} else {clearInterval(tmr); alert("Focus complete! ☕");} }, 1000); }
        function pauseTimer() { clearInterval(tmr); }
        function resetTimer() { clearInterval(tmr); tmp = 25 * 60; atualizarDisplay(); }
    </script>
</body>
</html>
