<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Dashboard | Fabio Pro</title>
    
    <!-- Bibliotecas Externas: Confetes e Ícones -->
    <script src="https://jsdelivr.net"></script>
    <link rel="stylesheet" href="https://jsdelivr.net">

    <style>
        :root {
            --bg-color: rgba(240, 242, 245, 0.85);
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --primary: #6c5ce7;
        }

        [data-theme="dark"] {
            --bg-color: rgba(26, 26, 46, 0.9);
            --card-bg: #16213e;
            --text-main: #e9ecef;
            --primary: #4834d4;
        }

        body {
            background-image: url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            transition: 0.4s;
            color: var(--text-main);
        }

        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: #f1c40f; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin: 0; }
        header p { color: #ffffff; font-style: italic; font-weight: bold; margin-top: 5px; }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
        }

        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; background: rgba(0,0,0,0.02); color: inherit; }
        button { cursor: pointer; border: none; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; padding: 12px; width: 100%; margin-top: 5px; }
        .btn-main:hover { filter: brightness(1.2); }

        .pergunta { font-size: 1.1rem; min-height: 50px; margin-bottom: 15px; font-weight: bold; }
        .res-feedback { margin-top: 10px; font-weight: bold; height: 20px; }

        .concluida { text-decoration: line-through; opacity: 0.5; color: #636e72; }

        #theme-toggle { position: fixed; top: 20px; right: 20px; font-size: 24px; background: rgba(255,255,255,0.2); border-radius: 50%; padding: 10px; color: white; cursor: pointer; }
        
        footer { margin-top: 40px; padding: 20px; text-align: center; color: white; width: 100%; }

        /* Estilo da Barra de Progresso */
        .progress-container { background: #eee; border-radius: 10px; height: 12px; margin: 15px 0 5px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); width: 0%; height: 100%; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body data-theme="light">

    <div id="theme-toggle" onclick="toggleTheme()">🌓</div>

    <header>
        <h1>Creator Flow 🚀</h1>
        <p>"Estudando TI: Um passo de cada vez."</p>
    </header>

    <div class="dashboard">
        <!-- BLOCO 1: METAS COM GRÁFICO -->
        <div class="card">
            <h2 style="text-align: left; margin:0">Metas do Dia 📝</h2>
            
            <div class="progress-container">
                <div id="barra-progresso" class="progress-bar"></div>
            </div>
            <p style="font-size: 0.8rem; text-align: right; margin-bottom: 15px;">Concluído: <span id="texto-progresso">0%</span></p>

            <div style="display: flex; gap: 5px;">
                <input type="text" id="taskInput" placeholder="Nova tarefa...">
                <button class="btn-main" style="width: 60px; margin:0" onclick="addTask()">+</button>
            </div>
            <ul id="taskList" style="padding: 10px 0; margin: 0; text-align: left"></ul>
        </div>

        <!-- BLOCO 2: QUIZ -->
        <div class="card">
            <h2>Revisão de TI 🧠</h2>
            <p>Acertos: <span id="placar" style="color: var(--primary); font-weight: bold;">0</span></p>
            <div id="pergunta-texto" class="pergunta">Carregando...</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background:#2ecc71" onclick="verificar(true)">SIM</button>
                <button class="btn-main" style="background:#e74c3c" onclick="verificar(false)">NÃO</button>
            </div>
            <div id="feedback" class="res-feedback"></div>
            <button class="btn-main" style="background:#636e72; margin-top: 15px;" onclick="proximaPergunta()">Próxima</button>
        </div>

        <!-- BLOCO 3: CALCULADORA -->
        <div class="card">
            <h2 style="text-align: left; margin:0">Calculadora 💡</h2>
            <div style="margin-top: 20px;">
                <input type="number" id="n1" placeholder="Valor 1">
                <input type="number" id="n2" placeholder="Valor 2">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-main" onclick="calc('+')">+</button>
                    <button class="btn-main" onclick="calc('*')">x</button>
                </div>
                <h3 id="res-calc" style="color: var(--primary); margin-top: 15px; font-size: 2rem;">0</h3>
            </div>
        </div>

        <!-- BLOCO 4: TIMER -->
        <div class="card">
            <h2>Foco nos Estudos ⏱️</h2>
            <div id="timer-display" style="font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #2ecc71;">25:00</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background:#27ae60" onclick="startTimer()">PLAY</button>
                <button class="btn-main" style="background:#e67e22" onclick="pauseTimer()">PAUSE</button>
                <button class="btn-main" style="background:#95a5a6" onclick="resetTimer()">RESET</button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Dashboard Criado por <strong>Fabio</strong> | Analista em Formação 🚀</p>
    </footer>

    <script>
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        // --- LÓGICA DA LISTA ---
        window.onload = () => {
            const salvas = JSON.parse(localStorage.getItem("fabioTasksV3")) || [];
            if (salvas.length === 0) {
                const iniciais = ["Estudar Inglês 🇺🇸", "Estudar TI 💻", "Praticar Atividade Física 🏋️", "Organizar Finanças 💰"];
                iniciais.forEach(t => renderTask(t, false));
                saveTasks();
            } else {
                salvas.forEach(t => renderTask(t.text, t.done));
            }
            atualizarGrafico();
            carregarPergunta();
        };

        function addTask() {
            const input = document.getElementById('taskInput');
            if(!input.value) return;
            renderTask(input.value, false);
            saveTasks();
            input.value = '';
        }

        function renderTask(text, done) {
            const li = document.createElement('li');
            li.style.cssText = "background:rgba(0,0,0,0.05); margin:5px 0; padding:10px; border-radius:12px; list-style:none; display:flex; justify-content:space-between; align-items:center;";
            li.innerHTML = `
                <span onclick="toggleTask(this)" class="${done ? 'concluida' : ''}" style="flex-grow:1; cursor:pointer;">${text}</span>
                <button onclick="this.parentElement.remove(); saveTasks()" style="background:none; border:none; cursor:pointer">🗑️</button>
            `;
            document.getElementById('taskList').appendChild(li);
        }

        function toggleTask(el) {
            el.classList.toggle('concluida');
            saveTasks();
        }

        function saveTasks() {
            const tasks = [];
            document.querySelectorAll('#taskList li').forEach(li => {
                tasks.push({ text: li.querySelector('span').innerText, done: li.querySelector('span').classList.contains('concluida') });
            });
            localStorage.setItem("fabioTasksV3", JSON.stringify(tasks));
            atualizarGrafico();
        }

        function atualizarGrafico() {
            const total = document.querySelectorAll('#taskList li').length;
            const concluidas = document.querySelectorAll('#taskList .concluida').length;
            const porcentagem = total > 0 ? Math.round((concluidas / total) * 100) : 0;

            document.getElementById('barra-progresso').style.width = porcentagem + "%";
            document.getElementById('texto-progresso').innerText = porcentagem + "%";

            if (porcentagem === 100 && total > 0) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        }

        // --- QUIZ ---
        const perguntas = [
            { q: "HTML é uma linguagem de programação?", a: false },
            { q: "CSS serve para dar estilo à página?", a: true },
            { q: "JavaScript pode criar alertas?", a: true },
            { q: "GitHub e Git são a mesma coisa?", a: false },
            { q: "Responsividade ajusta o site ao celular?", a: true }
        ];
        let indexAtual = 0; let pontos = 0;
        function carregarPergunta() {
            document.getElementById('pergunta-texto').innerText = perguntas[indexAtual].q;
            document.getElementById('feedback').innerText = "";
        }
        function verificar(res) {
            const f = document.getElementById('feedback');
            if (f.innerText !== "") return;
            const correto = (res === perguntas[indexAtual].a);
            f.innerText = correto ? "Correto! ✅" : "Errado! ❌";
            f.style.color = correto ? "#2ecc71" : "#e74c3c";
            if(correto) { pontos++; document.getElementById('placar').innerText = pontos; }
        }
        function proximaPergunta() { indexAtual = (indexAtual + 1) % perguntas.length; carregarPergunta(); }

        // --- CALC E TIMER ---
        function calc(op) {
            const v1 = Number(document.getElementById('n1').value);
            const v2 = Number(document.getElementById('n2').value);
            document.getElementById('res-calc').innerText = op === '+' ? v1 + v2 : v1 * v2;
        }

        let timer; let tempo = 25 * 60;
        function atualizarDisplay() {
            const m = Math.floor(tempo / 60); const s = tempo % 60;
            document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        function startTimer() { clearInterval(timer); timer = setInterval(() => { if(tempo>0){tempo--; atualizarDisplay();} else {clearInterval(timer); alert("Foco concluído! ☕");} }, 1000); }
        function pauseTimer() { clearInterval(timer); }
        function resetTimer() { clearInterval(timer); tempo = 25 * 60; atualizarDisplay(); }
    </script>
</body>
</html>
