<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Minha Lista de Tarefas</title>
</head>
<body>

    <!-- Estrutura principal -->
    <div id="caixa-principal">
        <h1>Minha Lista 📝</h1>
        
        <div class="entrada">
            <input type="text" id="input-tarefa" placeholder="Digite uma tarefa...">
            <button id="btn-adicionar">Adicionar</button>
        </div>

        <ul id="lista-tarefas">
            <!-- As tarefas vão aparecer aqui dentro -->
        </ul>

        <button id="btn-limpar">Limpar Tudo</button>
    </div>

</body>
</html>
