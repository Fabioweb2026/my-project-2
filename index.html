<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Dashboard & Quiz</title>
    <style>
        :root {
            --bg-color: rgba(240, 242, 245, 0.85);
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --primary: #6c5ce7;
        }

        [data-theme="dark"] {
            --bg-color: rgba(26, 26, 46, 0.9);
            --card-bg: #16213e;
            --text-main: #e9ecef;
            --primary: #4834d4;
        }

        body {
            
            background-image: url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.5);
            background-blend-mode: darken;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            padding: 20px;
            transition: 0.4s;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #f1c40f; /* Amarelo */
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0;
        }

        header p {
            color: #ffffff; /* Branco */
            font-style: italic;
            font-weight: bold;
            margin-top: 5px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            padding: 10px;
            width: 100%;
            margin-top: 5px;
        }

        .quiz-box {
            text-align: center;
        }

        .pergunta {
            font-size: 1.1rem;
            min-height: 50px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .res-feedback {
            margin-top: 10px;
            font-weight: bold;
            height: 20px;
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            padding: 5px;
        }
    </style>
</head>
<body data-theme="light">

    <button id="theme-toggle" onclick="toggleTheme()">🌓</button>

    <header>
        <h1>Creator Flow 🚀</h1>
        <p>"Estudando TI: Um passo de cada vez."</p>
    </header>

    <div class="dashboard">
        <!-- BLOCO 1: LISTA DE TAREFAS -->
        <div class="card">
            <h2>Metas do Dia 📝</h2>
            <input type="text" id="taskInput" placeholder="Nova tarefa...">
            <button class="btn-main" onclick="addTask()">Adicionar</button>
            <ul id="taskList" style="padding: 10px 0;"></ul>
        </div>

        <!-- BLOCO 2: QUIZ -->
        <div class="card quiz-box">
            <h2>Revisão de TI 🧠</h2>
            <div id="pergunta-texto" class="pergunta">Carregando pergunta...</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" style="background:#2ecc71" onclick="verificar(true)">SIM</button>
                <button class="btn-main" style="background:#e74c3c" onclick="verificar(false)">NÃO</button>
            </div>
            <div id="feedback" class="res-feedback"></div>
            <button class="btn-main" style="background:#95a5a6; margin-top: 15px;" onclick="proximaPergunta()">Próxima</button>
        </div>

        <!-- BLOCO 3: CALCULADORA -->
        <div class="card">
            <h2>Calculadora 💡</h2>
            <input type="number" id="n1" placeholder="Valor 1">
            <input type="number" id="n2" placeholder="Valor 2">
            <div style="display: flex; gap: 10px;">
                <button class="btn-main" onclick="calc('+')">+</button>
                <button class="btn-main" onclick="calc('*')">x</button>
            </div>
            <h3 id="res-calc" style="text-align: center; color: var(--primary); margin-top: 15px;">0</h3>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        const perguntas = [
            { q: "HTML é uma linguagem de programação?", a: false },
            { q: "CSS serve para dar estilo à página?", a: true },
            { q: "JavaScript pode criar alertas no navegador?", a: true },
            { q: "Bootstrap é um framework de CSS?", a: true },
            { q: "O <head> é a parte visível do site?", a: false }
        ];

        let indexAtual = 0;

        function carregarPergunta() {
            document.getElementById('pergunta-texto').innerText = perguntas[indexAtual].q;
            document.getElementById('feedback').innerText = "";
        }

        function verificar(respostaUser) {
            const feedback = document.getElementById('feedback');
            if (respostaUser === perguntas[indexAtual].a) {
                feedback.innerText = "Correto! ✅";
                feedback.style.color = "#2ecc71";
            } else {
                feedback.innerText = "Errado! ❌";
                feedback.style.color = "#e74c3c";
            }
        }

        function proximaPergunta() {
            indexAtual = (indexAtual + 1) % perguntas.length;
            carregarPergunta();
        }
function addTask() {
    const input = document.getElementById('taskInput');
    if(!input.value) return;

    const li = document.createElement('li');
    // Adicionamos um <span> para o texto e um <button> para a lixeira
    li.innerHTML = `
        <span onclick="this.style.textDecoration='line-through'" style="flex-grow: 1;">${input.value}</span>
        <button onclick="this.parentElement.remove()" style="background:none; border:none; cursor:pointer; font-size:1.1rem;">🗑️</button>
    `;
    
    // Estilo para deixar o texto de um lado e a lixeira do outro
    li.style.cssText = "background:rgba(0,0,0,0.05); margin:5px 0; padding:8px 12px; border-radius:10px; list-style:none; cursor:pointer; display:flex; align-items:center; justify-content:space-between;";
    
    document.getElementById('taskList').appendChild(li);
    input.value = '';
}

        function calc(op) {
            const v1 = Number(document.getElementById('n1').value);
            const v2 = Number(document.getElementById('n2').value);
            document.getElementById('res-calc').innerText = op === '+' ? v1 + v2 : v1 * v2;
        }

        carregarPergunta();
    </script>
</body>:
    <footer style="margin-top: 50px; color: white; text-align: center; font-size: 0.9rem; opacity: 0.8;">
    <p>© 2026 Desenvolvido por Fabio - Estudante de TI 🚀</p>
</footer>

</html>
