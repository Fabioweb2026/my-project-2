<!DOCTYPE html>
<html>
<head>
  <title>Minha Lista de Tarefas</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #74b9ff, #a29bfe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 70%;
    }

    button {
      padding: 10px;
      background: #6c5ce7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    li {
      list-style: none;
      margin-top: 10px;
      background: #f1f2f6;
      padding: 10px;
      border-radius: 8px;
    }

    .concluida {
      text-decoration: line-through;
      color: gray;
    }
  </style>

</head>

<body>

<div class="container">

  <h1>Minha Lista de Tarefas 📝</h1>

  <input id="tarefa" placeholder="Digite uma tarefa">
  <button onclick="adicionar()">Adicionar</button>

  <ul id="lista"></ul>

</div>

<script>
function adicionar() {
  let input = document.getElementById("tarefa");
  let texto = input.value;

  if (texto === "") return;

  let li = document.createElement("li");

  li.innerHTML = `
    <span onclick="concluir(this)">${texto}</span>
    <button onclick="remover(this)">❌</button>
  `;

  document.getElementById("lista").appendChild(li);

  input.value = "";
}

function remover(botao) {
  botao.parentElement.remove();
}

function concluir(texto) {
  texto.classList.toggle("concluida");
}
</script>

</body>
</html>
